name: Real Provider Stage Acceptance (Manual)

on:
  workflow_dispatch:
    inputs:
      suite:
        description: 选择 real provider 验收套件
        required: true
        default: real-acceptance
        type: choice
        options:
          - real-smoke
          - real-acceptance
          - all

jobs:
  real-provider-stage-acceptance:
    name: real provider stage acceptance
    runs-on: ubuntu-latest
    env:
      AGENT_PROVIDER: openai_compatible
      AGENT_FALLBACK_TO_MOCK: "false"
      AGENT_API_BASE_URL: ${{ vars.AGENT_API_BASE_URL }}
      AGENT_API_KEY: ${{ secrets.AGENT_API_KEY }}
      AGENT_MODEL: ${{ vars.AGENT_MODEL }}

    steps:
      - name: 检出代码
        uses: actions/checkout@v5

      - name: 设置 Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 真实 provider 前置检查
        shell: bash
        run: |
          set -euo pipefail
          : "${AGENT_PROVIDER:?AGENT_PROVIDER 未配置}"
          : "${AGENT_API_BASE_URL:?AGENT_API_BASE_URL 未配置}"
          : "${AGENT_API_KEY:?AGENT_API_KEY 未配置}"
          : "${AGENT_MODEL:?AGENT_MODEL 未配置}"
          if [ "${AGENT_FALLBACK_TO_MOCK}" != "false" ]; then
            echo "::error::AGENT_FALLBACK_TO_MOCK 必须为 false，当前=${AGENT_FALLBACK_TO_MOCK}"
            exit 1
          fi
          echo "provider=${AGENT_PROVIDER} model=${AGENT_MODEL}"

      - name: 执行 real provider 阶段验收
        run: python tests/run_stage_acceptance.py --suite "${{ inputs.suite }}" --summary-file output/stage_acceptance_summary_${{ inputs.suite }}.json

      - name: 检查阶段验收输出文件
        if: always()
        shell: bash
        run: |
          shopt -s nullglob
          summary_files=(output/stage_acceptance_summary_${{ inputs.suite }}.json output/stage_acceptance_summary_${{ inputs.suite }}_*.json)
          output_files=(output/*)
          if [ ${#summary_files[@]} -eq 0 ]; then
            echo "::warning::未找到 summary 文件（output/stage_acceptance_summary_${{ inputs.suite }}_*.json）。"
          else
            echo "找到 ${#summary_files[@]} 个 summary 文件："
            printf '%s\n' "${summary_files[@]}"
          fi
          if [ ${#output_files[@]} -eq 0 ]; then
            echo "::warning::未找到 output 目录产物。"
          else
            echo "output 目录共 ${#output_files[@]} 个文件。"
          fi

      - name: 上传 real provider 阶段验收摘要
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: real-provider-stage-acceptance-summary
          path: |
            output/stage_acceptance_summary_${{ inputs.suite }}.json
            output/stage_acceptance_summary_${{ inputs.suite }}_*.json
          if-no-files-found: warn

      - name: 上传 real provider 阶段验收 output 工件
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: real-provider-stage-acceptance-output
          path: output/**
          if-no-files-found: warn

      - name: 校验 manifest 完整性（real-smoke / all）
        if: always()
        shell: bash
        run: |
          shopt -s nullglob
          if [ "${{ inputs.suite }}" = "real-acceptance" ]; then
            echo "suite=real-acceptance：当前不强制套用 real-smoke manifest 结构，跳过校验。"
            exit 0
          fi
          if [ "${{ inputs.suite }}" = "real-smoke" ]; then
            artifact_dirs=(output/real-smoke_artifacts_*)
          else
            artifact_dirs=(output/all_artifacts_*)
          fi
          if [ ${#artifact_dirs[@]} -eq 0 ]; then
            echo "未找到可校验 artifact 目录，suite=${{ inputs.suite }}"
            exit 1
          fi
          for dir in "${artifact_dirs[@]}"; do
            echo "校验 artifact 目录: ${dir}"
            python tests/validate_real_smoke_artifacts.py --artifact-dir "${dir}"
          done

      - name: 上传 real provider 可归档工件目录
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: real-provider-stage-acceptance-artifacts
          path: |
            output/*_artifacts_*/**
            output/real_provider_sequence_acceptance/**
          if-no-files-found: warn
          
